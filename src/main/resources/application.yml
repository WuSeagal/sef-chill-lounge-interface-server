server:
  port: 9041
  error:
    whitelabel:
      enabled: false
  servlet:
    context-path: ${CONTEXT_PATH:/}
    session:
      timeout: -1
      cookie:
        name: ${SESSION_COOKIE_NAME:SEFCLISESSIONID}
        http-only: true
        secure: true

logging:
  file:
    name: /sef-cli/logs/sef-cli.log

spring:
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB
  jackson:
    time-zone: GMT+8
  application:
    name: sef-chill-lounge-interface-server
  main:
    allow-bean-definition-overriding: true
  datasource:
    hikari:
      maximum-pool-size: 30
      connection-timeout: 20000
      idle-timeout: 600000
      leak-detection-threshold: 2000
      pool-name: SefCliHikariPool
  jpa:
    open-in-view: false
    show-sql: false
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        show_sql: false
  profiles:
    # PRD: postgresql
    active: ${SPRING_PROFILES_ACTIVE:dev,dev-sql}
  data:
  #    redis:
  #      host: ${REDIS_HOST:localhost}
  #      port: ${REDIS_PORT:6379}
  #      database: ${REDIS_DATABASE_INDEX:0}
  #      timeout: 60000
  #      lettuce:
  #        pool:
  #          max-active: 8
  #          max-wait: 60000
  #          max-idle: 8
  #          min-idle: 0
  #        shutdown-timeout: 100
  #      password: ${REDIS_PASSWORD:''}
  #      ssl:
  #        enabled: ${REDIS_SSL_ENABLED:false}
  #      repositories:
  #        enabled: false
  session:
    store-type: jdbc
    timeout: 2147483647s
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_FROM:anonywsg@gmail.com}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true

report:
  mail:
    from: ${MAIL_FROM:anonywsg@gmail.com}
    to: ${MAIL_TO:seagal.wu@seagalogs.com,anonywsg@gmail.com,wuseagal@gmail.com}

springdoc:
  show-login-endpoint: true

app:
  base-url: ${APP_BASE_URL:http://localhost:9041}

frontend:
  base-url: ${FRONTEND_BASE_URL:http://localhost:9045}

google-oauth:
  client-id: ${GOOGLE_OAUTH_CLIENT_ID:}
  client-secret: ${GOOGLE_OAUTH_CLIENT_SECRET:}
  redirect-uri: ${GOOGLE_OAUTH_REDIRECT_URI:http://localhost:9045/oauth2/callback}

sef-images:
  base-path: ${SEF_IMAGES_BASE_PATH:./sef-cli/images/}
  max-file-size-mb: ${SEF_IMAGES_MAX_FILE_SIZE_MB:10}
  chat:
    url-prefix: ${SEF_IMAGES_CHAT_URL_PREFIX:/image/}
    # NOTE: 暫時改為 3 以便手動驗證 FIFO eviction，正式上線前應改回 1000
    max-count: ${SEF_IMAGES_CHAT_MAX_COUNT:3}
    ttl-days: ${SEF_IMAGES_CHAT_TTL_DAYS:90}
  user:
    url-prefix: ${SEF_IMAGES_USER_URL_PREFIX:/user/}
  sticker:
    url-prefix: ${SEF_IMAGES_STICKER_URL_PREFIX:/sticker/}
