spring:
  datasource:
    #    本地測試用
    driver-class-name: org.h2.Driver
    username: 'sa'
    password:
    url: jdbc:h2:mem:sef-cli;DB_CLOSE_ON_EXIT=FALSE;IGNORECASE=TRUE;MODE=PostgreSQL
    # H2 的 JDBC URL, mem 表示使用記憶體, my_app 是資料庫的名稱
    hikari:
      maximum-pool-size: 30
      connection-timeout: 20000
      idle-timeout: 600000
      leak-detection-threshold: 2000
      pool-name: SefCliHikariPool
  h2:
    console:
      enabled: true  # 啟用 H2 的 Console 介面, 方便開發者查看資料庫內容
      path: '/h2'
      settings:
          web-allow-others: true
  sql:
    init:
      platform: h2